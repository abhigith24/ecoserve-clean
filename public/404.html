<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found | EcoServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
  <style>
    body { background: var(--green-900); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .notfound-card { background: var(--white); border-radius: var(--radius-lg); padding: 3rem 2.5rem; text-align: center; max-width: 480px; width: 100%; box-shadow: 0 30px 80px rgba(0,0,0,.3); }
    .big-num { font-family: var(--font-display); font-size: 6rem; font-weight: 800; color: var(--green-200); line-height: 1; margin-bottom: .5rem; }
    .truck-anim { font-size: 3rem; animation: drive 3s linear infinite; display: inline-block; }
    @keyframes drive { 0%{transform:translateX(-60px)} 100%{transform:translateX(60px)} }
  </style>
</head>
<body>
  <div class="notfound-card">
    <div class="big-num">404</div>
    <div class="truck-anim">🚛</div>
    <h3 style="font-family:var(--font-display);margin:1rem 0 .5rem;color:var(--green-900);">Page Not Found</h3>
    <p class="text-muted" style="font-size:.9rem;">Looks like the truck took a wrong turn! The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex gap-3 justify-content-center mt-4">
      <a href="/" class="btn-eco-primary"><i class="fas fa-home"></i> Go Home</a>
      <a href="javascript:history.back()" class="btn-eco-outline"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
    <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
      <p style="font-size:.78rem;color:var(--text-muted);">🌿 EcoServe — Smarter Waste Management</p>
    </div>
  </div>
</body>
</html>

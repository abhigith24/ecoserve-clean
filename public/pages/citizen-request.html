<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Pickup Request – EcoServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
  <style>
    .waste-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .75rem; }
    .waste-card {
      border: 2px solid var(--border); border-radius: var(--radius); padding: 1rem .75rem;
      text-align: center; cursor: pointer; transition: all var(--transition);
    }
    .waste-card:hover { border-color: var(--green-400); background: var(--green-50); }
    .waste-card.selected { border-color: var(--green-600); background: var(--green-100); }
    .waste-card .wicon { font-size: 2rem; margin-bottom: .4rem; }
    .waste-card .wname { font-family: var(--font-display); font-size: .82rem; font-weight: 700; color: var(--green-800); }
    .step-indicator { display: flex; gap: .5rem; margin-bottom: 2rem; }
    .step-dot { flex: 1; height: 4px; border-radius: 4px; background: var(--border); transition: background .4s; }
    .step-dot.active { background: var(--green-500); }
  </style>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">
  <div class="page-header">
    <div><h1 class="page-title">New Pickup Request</h1><p class="page-subtitle">Schedule a waste collection at your location</p></div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="step-indicator">
        <div class="step-dot active" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>
      </div>

      <div class="eco-card" id="step-1">
        <h5 class="eco-card-title"><i class="fas fa-recycle text-primary"></i> Step 1: Select Waste Type</h5>
        <div class="waste-grid">
          <div class="waste-card selected" data-type="general" onclick="selectWaste('general', this)">
            <div class="wicon">🗑️</div><div class="wname">General</div>
          </div>
          <div class="waste-card" data-type="recyclable" onclick="selectWaste('recyclable', this)">
            <div class="wicon">♻️</div><div class="wname">Recyclable</div>
          </div>
          <div class="waste-card" data-type="organic" onclick="selectWaste('organic', this)">
            <div class="wicon">🌿</div><div class="wname">Organic</div>
          </div>
          <div class="waste-card" data-type="hazardous" onclick="selectWaste('hazardous', this)">
            <div class="wicon">☣️</div><div class="wname">Hazardous</div>
          </div>
          <div class="waste-card" data-type="e-waste" onclick="selectWaste('e-waste', this)">
            <div class="wicon">💻</div><div class="wname">E-Waste</div>
          </div>
        </div>
        <div class="d-flex justify-content-end mt-4">
          <button class="btn-eco-primary" onclick="goStep(2)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>

      <div class="eco-card d-none" id="step-2">
        <h5 class="eco-card-title"><i class="fas fa-map-marker-alt text-primary"></i> Step 2: Location & Schedule</h5>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Pickup Address *</label>
            <textarea class="form-control" id="req-address" rows="2" placeholder="House No, Street, Area, Landmark" required></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">Ward No.</label>
            <input type="text" class="form-control" id="req-ward" placeholder="e.g. 04"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Zone</label>
            <select class="form-select" id="req-zone">
              <option value="">Select Zone</option>
              <option value="Central">Central Zone</option>
              <option value="North">North Zone</option>
              <option value="South">South Zone</option>
              <option value="East">East Zone</option>
              <option value="West">West Zone</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Preferred Date *</label>
            <input type="date" class="form-control" id="req-date" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Preferred Time</label>
            <select class="form-select" id="req-time">
              <option value="">Any Time</option>
              <option value="Morning (8AM–12PM)">Morning (8AM–12PM)</option>
              <option value="Afternoon (12PM–4PM)">Afternoon (12PM–4PM)</option>
              <option value="Evening (4PM–8PM)">Evening (4PM–8PM)</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Estimated Quantity (kg)</label>
            <input type="number" class="form-control" id="req-qty" placeholder="e.g. 10" min="0.1" step="0.1"/>
          </div>
        </div>
        <div class="d-flex justify-content-between mt-4">
          <button class="btn-eco-outline" onclick="goStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
          <button class="btn-eco-primary" onclick="goStep(3)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>

      <div class="eco-card d-none" id="step-3">
        <h5 class="eco-card-title"><i class="fas fa-check-circle text-primary"></i> Step 3: Additional Details & Confirm</h5>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-control" id="req-desc" rows="3" placeholder="Describe your waste, any special instructions..."></textarea>
          </div>
        </div>

        <!-- Summary -->
        <div class="eco-card mt-4" style="background:var(--green-50);border:1.5px solid var(--green-100);">
          <div class="eco-card-title"><i class="fas fa-list-check"></i> Request Summary</div>
          <div class="row g-2" style="font-size:.88rem;">
            <div class="col-6"><b>Waste Type:</b></div>
            <div class="col-6" id="sum-type">—</div>
            <div class="col-6"><b>Address:</b></div>
            <div class="col-6" id="sum-address">—</div>
            <div class="col-6"><b>Preferred Date:</b></div>
            <div class="col-6" id="sum-date">—</div>
            <div class="col-6"><b>Quantity:</b></div>
            <div class="col-6" id="sum-qty">—</div>
          </div>
        </div>

        <div id="req-alert" class="mt-3"></div>

        <div class="d-flex justify-content-between mt-4">
          <button class="btn-eco-outline" onclick="goStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
          <button class="btn-eco-primary" id="submit-btn" onclick="submitRequest()"><i class="fas fa-paper-plane"></i> Submit Request</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Notifications</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('citizen')) {}
  buildLayout('new-request');

  // Set min date
  document.getElementById('req-date').min = new Date().toISOString().split('T')[0];

  // Pre-fill address from profile
  const user = Auth.getUser();
  (async () => {
    const data = await apiRequest('/auth/profile');
    if (data?.user) {
      if (data.user.address) document.getElementById('req-address').value = data.user.address;
      if (data.user.ward_no) document.getElementById('req-ward').value = data.user.ward_no;
      if (data.user.zone)    document.getElementById('req-zone').value = data.user.zone;
    }
  })();

  let selectedWaste = 'general';
  let currentStep = 1;

  function selectWaste(type, el) {
    document.querySelectorAll('.waste-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedWaste = type;
  }

  function goStep(step) {
    if (step === 2) {
      if (!selectedWaste) { showToast('Please select a waste type.', 'warning'); return; }
    }
    if (step === 3) {
      if (!document.getElementById('req-address').value.trim()) { showToast('Address is required.', 'warning'); return; }
      if (!document.getElementById('req-date').value) { showToast('Please select a preferred date.', 'warning'); return; }
      // Update summary
      document.getElementById('sum-type').innerHTML = wasteTypeBadge(selectedWaste);
      document.getElementById('sum-address').textContent = document.getElementById('req-address').value.slice(0,60);
      document.getElementById('sum-date').textContent = formatDate(document.getElementById('req-date').value) + ' ' + (document.getElementById('req-time').value||'Any Time');
      document.getElementById('sum-qty').textContent = document.getElementById('req-qty').value ? document.getElementById('req-qty').value + ' kg' : 'Not specified';
    }
    for (let i=1;i<=3;i++) {
      document.getElementById(`step-${i}`).classList.add('d-none');
      document.getElementById(`dot-${i}`).classList.remove('active');
    }
    document.getElementById(`step-${step}`).classList.remove('d-none');
    for (let i=1;i<=step;i++) document.getElementById(`dot-${i}`).classList.add('active');
    currentStep = step;
  }

  async function submitRequest() {
    const btn = document.getElementById('submit-btn');
    const alertBox = document.getElementById('req-alert');
    alertBox.innerHTML = '';
    setLoading(btn, true);

    const payload = {
      waste_type:     selectedWaste,
      address:        document.getElementById('req-address').value,
      ward_no:        document.getElementById('req-ward').value,
      zone:           document.getElementById('req-zone').value,
      preferred_date: document.getElementById('req-date').value,
      preferred_time: document.getElementById('req-time').value,
      quantity_kg:    document.getElementById('req-qty').value || null,
      description:    document.getElementById('req-desc').value
    };

    const data = await apiRequest('/requests', 'POST', payload);
    setLoading(btn, false);

    if (data?.success) {
      alertBox.innerHTML = `<div class="eco-alert eco-alert-success"><i class="fas fa-check-circle"></i> Request #${data.request_id} submitted successfully! Redirecting...</div>`;
      setTimeout(() => window.location.href = 'citizen-my-requests.html', 1500);
    } else {
      alertBox.innerHTML = `<div class="eco-alert eco-alert-error"><i class="fas fa-exclamation-circle"></i> ${data?.message||'Failed to submit.'}</div>`;
    }
  }
</script>
</body>
</html>

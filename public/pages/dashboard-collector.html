<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collector Dashboard – EcoServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">
  <div class="page-header">
    <div><h1 class="page-title" id="welcome-msg">Welcome!</h1><p class="page-subtitle">Your collection overview for today</p></div>
    <span id="today-date" class="text-muted" style="font-size:.85rem;"></span>
  </div>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card stat-amber">
        <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
        <div><div class="stat-value" id="cnt-assigned">—</div><div class="stat-label">Assigned</div></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-purple" style="">
        <div class="stat-icon" style="background:#ede9fe;color:#7c3aed;"><i class="fas fa-truck-moving"></i></div>
        <div><div class="stat-value" id="cnt-inprogress">—</div><div class="stat-label">In Progress</div></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-green">
        <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
        <div><div class="stat-value" id="cnt-completed">—</div><div class="stat-label">Completed</div></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-blue">
        <div class="stat-icon"><i class="fas fa-calendar-days"></i></div>
        <div><div class="stat-value" id="cnt-schedules">—</div><div class="stat-label">Schedules</div></div>
      </div>
    </div>
  </div>

  <!-- Pickup cards -->
  <div class="eco-card-title mb-3" style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--green-800);">
    <i class="fas fa-inbox text-primary"></i> Assigned Pickups
    <a href="collector-pickups.html" class="ms-3 btn-eco-outline" style="font-size:.78rem;padding:.28rem .85rem;">View All</a>
  </div>
  <div class="row g-3" id="pickups-grid">
    <div class="col-12 text-center py-5"><div class="eco-spinner"></div></div>
  </div>
</div>

<!-- Status Update Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-edit me-2"></i>Update Status — Request <span id="modal-req-id"></span></h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">New Status</label>
      <select class="form-select mb-3" id="new-status">
        <option value="in_progress">🚛 Mark In Progress</option>
        <option value="completed">✅ Mark Completed</option>
        <option value="cancelled">❌ Cancel</option>
      </select>
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-control" id="status-notes" rows="3" placeholder="Any remarks for this pickup..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      <button class="btn-eco-primary" id="update-status-btn" onclick="updateStatus()"><i class="fas fa-check"></i> Update</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Notifications</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('collector')) {}
  buildLayout('dashboard');
  const user = Auth.getUser();
  document.getElementById('welcome-msg').textContent = `Hey, ${user.full_name.split(' ')[0]}! 🚛`;
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  let currentReqId = null;

  async function loadPickups() {
    const data = await apiRequest('/requests/assigned');
    const grid = document.getElementById('pickups-grid');
    if (!data?.success) return;
    const reqs = data.requests;
    document.getElementById('cnt-assigned').textContent   = reqs.filter(r=>r.status==='assigned').length;
    document.getElementById('cnt-inprogress').textContent = reqs.filter(r=>r.status==='in_progress').length;
    document.getElementById('cnt-completed').textContent  = reqs.filter(r=>r.status==='completed').length;

    const active = reqs.filter(r=>!['completed','cancelled'].includes(r.status)).slice(0,6);
    if (!active.length) {
      grid.innerHTML = '<div class="col-12"><div class="empty-state"><div class="empty-icon">🚛</div><h4>No Active Pickups</h4><p>You have no assigned pickups right now.</p></div></div>';
      return;
    }
    grid.innerHTML = active.map(r => `
      <div class="col-md-6 col-lg-4">
        <div class="eco-card h-100">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <span style="font-family:var(--font-display);font-weight:800;color:var(--green-700);">#${r.id}</span>
            ${statusBadge(r.status)}
          </div>
          ${wasteTypeBadge(r.waste_type)}
          <div class="mt-2 mb-1" style="font-size:.82rem;">
            <div><i class="fas fa-user me-1 text-muted"></i><b>${r.citizen_name}</b> &nbsp;<span class="text-muted">${r.citizen_phone||''}</span></div>
            <div class="mt-1"><i class="fas fa-map-marker-alt me-1 text-muted"></i>${r.address.slice(0,65)}${r.address.length>65?'…':''}</div>
            <div class="mt-1"><i class="fas fa-calendar me-1 text-muted"></i>${formatDate(r.preferred_date)} ${r.preferred_time||''}</div>
            ${r.quantity_kg?`<div class="mt-1"><i class="fas fa-weight-hanging me-1 text-muted"></i>${r.quantity_kg} kg</div>`:''}
          </div>
          <button class="btn-eco-primary w-100 mt-3" style="font-size:.82rem;" onclick="openStatusModal(${r.id})">
            <i class="fas fa-edit"></i> Update Status
          </button>
        </div>
      </div>`).join('');
  }

  async function loadScheduleCount() {
    const data = await apiRequest('/schedules/my');
    if (data?.success) document.getElementById('cnt-schedules').textContent = data.schedules.filter(s=>s.status==='scheduled').length;
  }

  function openStatusModal(reqId) {
    currentReqId = reqId;
    document.getElementById('modal-req-id').textContent = `#${reqId}`;
    document.getElementById('status-notes').value = '';
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }

  async function updateStatus() {
    const btn = document.getElementById('update-status-btn');
    setLoading(btn, true);
    const data = await apiRequest(`/requests/${currentReqId}/status`, 'PUT', {
      status: document.getElementById('new-status').value,
      notes:  document.getElementById('status-notes').value
    });
    setLoading(btn, false);
    bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
    if (data?.success) { showToast('Status updated!', 'success'); loadPickups(); }
    else showToast(data?.message || 'Failed', 'error');
  }

  loadPickups();
  loadScheduleCount();
</script>
</body>
</html>

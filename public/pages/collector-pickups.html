<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Pickups – EcoServe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">
  <div class="page-header">
    <div><h1 class="page-title">My Pickups</h1><p class="page-subtitle">All assigned waste pickup requests</p></div>
    <div class="d-flex gap-2">
      <select class="form-select" id="filter-status" style="width:auto;" onchange="loadPickups()">
        <option value="">All</option>
        <option value="assigned">Assigned</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>
  </div>

  <div class="eco-card">
    <div class="table-responsive">
      <table class="eco-table">
        <thead><tr><th>#</th><th>Citizen</th><th>Type</th><th>Address</th><th>Date & Time</th><th>Qty</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="pickups-tbody"><tr><td colspan="8" class="text-center py-5"><div class="eco-spinner"></div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-edit me-2"></i>Update Status</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <label class="form-label">New Status</label>
      <select class="form-select mb-3" id="new-status">
        <option value="in_progress">🚛 In Progress</option>
        <option value="completed">✅ Completed</option>
        <option value="cancelled">❌ Cancelled</option>
      </select>
      <label class="form-label">Notes</label>
      <textarea class="form-control" id="status-notes" rows="3" placeholder="Optional remarks..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      <button class="btn-eco-primary" id="update-btn" onclick="doUpdate()"><i class="fas fa-check"></i> Update</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Notifications</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('collector')) {}
  buildLayout('assigned');
  let currentId = null;

  async function loadPickups() {
    const data = await apiRequest('/requests/assigned');
    const tbody = document.getElementById('pickups-tbody');
    const filter = document.getElementById('filter-status').value;
    if (!data?.success) return;
    let reqs = data.requests;
    if (filter) reqs = reqs.filter(r => r.status === filter);
    if (!reqs.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🚛</div><h4>No Pickups</h4></div></td></tr>';
      return;
    }
    tbody.innerHTML = reqs.map(r => `
      <tr>
        <td><b style="color:var(--green-700);">#${r.id}</b></td>
        <td><div class="fw-semibold">${r.citizen_name}</div><div class="text-muted" style="font-size:.75rem;">${r.citizen_phone||''}</div></td>
        <td>${wasteTypeBadge(r.waste_type)}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.address}">${r.address}</td>
        <td>${formatDate(r.preferred_date)}<br><span style="font-size:.75rem;color:var(--text-muted);">${r.preferred_time||''}</span></td>
        <td>${r.quantity_kg ? r.quantity_kg+' kg' : '—'}</td>
        <td>${statusBadge(r.status)}</td>
        <td>
          ${!['completed','cancelled'].includes(r.status)
            ? `<button class="btn-eco-primary" style="font-size:.75rem;padding:.28rem .75rem;" onclick="openModal(${r.id})"><i class="fas fa-edit"></i> Update</button>`
            : '<span class="text-muted" style="font-size:.8rem;">—</span>'}
        </td>
      </tr>`).join('');
  }

  function openModal(id) {
    currentId = id;
    document.getElementById('status-notes').value = '';
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }

  async function doUpdate() {
    const btn = document.getElementById('update-btn');
    setLoading(btn, true);
    const data = await apiRequest(`/requests/${currentId}/status`, 'PUT', {
      status: document.getElementById('new-status').value,
      notes:  document.getElementById('status-notes').value
    });
    setLoading(btn, false);
    bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
    if (data?.success) { showToast('Updated!', 'success'); loadPickups(); }
    else showToast(data?.message || 'Failed', 'error');
  }

  loadPickups();
</script>
</body>
</html>

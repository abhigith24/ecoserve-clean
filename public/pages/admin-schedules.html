<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedules – EcoServe Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">
  <div class="page-header">
    <div><h1 class="page-title">Collection Schedules</h1><p class="page-subtitle">Create and manage collector schedules</p></div>
    <button class="btn-eco-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> New Schedule</button>
  </div>

  <div class="eco-card">
    <div class="table-responsive">
      <table class="eco-table">
        <thead><tr><th>#</th><th>Collector</th><th>Zone</th><th>Ward</th><th>Date</th><th>Shift</th><th>Status</th><th>Notes</th></tr></thead>
        <tbody id="schedules-tbody"><tr><td colspan="8" class="text-center py-5"><div class="eco-spinner"></div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-calendar-plus me-2"></i>Create Schedule</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Collector</label>
          <select class="form-select" id="sch-collector"><option value="">Loading...</option></select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Zone</label>
          <select class="form-select" id="sch-zone">
            <option value="Central">Central Zone</option>
            <option value="North">North Zone</option>
            <option value="South">South Zone</option>
            <option value="East">East Zone</option>
            <option value="West">West Zone</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Ward No.</label>
          <input type="text" class="form-control" id="sch-ward" placeholder="e.g. 03"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" id="sch-date"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Shift</label>
          <select class="form-select" id="sch-shift">
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Route Notes</label>
          <textarea class="form-control" id="sch-notes" rows="2" placeholder="Optional route instructions"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button class="btn-eco-primary" id="create-btn" onclick="createSchedule()"><i class="fas fa-check"></i> Create</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Notifications</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('admin')) {}
  buildLayout('schedules');

  // Set min date to today
  document.getElementById('sch-date').min = new Date().toISOString().split('T')[0];

  async function loadCollectors() {
    const data = await apiRequest('/admin/collectors');
    const sel = document.getElementById('sch-collector');
    if (data?.success && data.collectors.length) {
      sel.innerHTML = data.collectors.filter(c => c.is_active).map(c => `<option value="${c.id}">${c.full_name} — ${c.zone||'N/A'}</option>`).join('');
    } else { sel.innerHTML = '<option>No collectors found</option>'; }
  }

  async function loadSchedules() {
    const data = await apiRequest('/schedules/all');
    const tbody = document.getElementById('schedules-tbody');
    if (!data?.success || !data.schedules.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📅</div><h4>No Schedules</h4><p>Create the first schedule.</p></div></td></tr>';
      return;
    }
    const shiftBadge = s => ({ morning:'🌅 Morning', afternoon:'☀️ Afternoon', evening:'🌇 Evening' }[s]||s);
    tbody.innerHTML = data.schedules.map(s => `
      <tr>
        <td><b style="color:var(--green-700);">#${s.id}</b></td>
        <td><div class="fw-semibold">${s.collector_name}</div></td>
        <td>${s.zone}</td>
        <td>${s.ward_no||'—'}</td>
        <td>${formatDate(s.scheduled_date)}</td>
        <td>${shiftBadge(s.shift)}</td>
        <td>${statusBadge(s.status)}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;" title="${s.route_notes||''}">${s.route_notes||'—'}</td>
      </tr>`).join('');
  }

  function openCreateModal() {
    new bootstrap.Modal(document.getElementById('createModal')).show();
  }

  async function createSchedule() {
    const btn = document.getElementById('create-btn');
    setLoading(btn, true);
    const data = await apiRequest('/schedules', 'POST', {
      collector_id:   document.getElementById('sch-collector').value,
      zone:           document.getElementById('sch-zone').value,
      ward_no:        document.getElementById('sch-ward').value,
      scheduled_date: document.getElementById('sch-date').value,
      shift:          document.getElementById('sch-shift').value,
      route_notes:    document.getElementById('sch-notes').value
    });
    setLoading(btn, false);
    bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
    if (data?.success) { showToast('Schedule created!', 'success'); loadSchedules(); }
    else showToast(data?.message || 'Failed', 'error');
  }

  loadCollectors();
  loadSchedules();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pickup Requests – EcoServe Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">

  <div class="page-header">
    <div><h1 class="page-title">Pickup Requests</h1><p class="page-subtitle">Manage and assign all waste pickup requests</p></div>
  </div>

  <!-- Filters -->
  <div class="eco-card mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-sm-4 col-md-3">
        <label class="form-label">Filter by Status</label>
        <select class="form-select" id="filter-status" onchange="loadRequests()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="assigned">Assigned</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="col-sm-4 col-md-3">
        <label class="form-label">Waste Type</label>
        <select class="form-select" id="filter-type" onchange="loadRequests()">
          <option value="">All Types</option>
          <option value="general">General</option>
          <option value="recyclable">Recyclable</option>
          <option value="hazardous">Hazardous</option>
          <option value="organic">Organic</option>
          <option value="e-waste">E-Waste</option>
        </select>
      </div>
      <div class="col-auto">
        <button class="btn-eco-outline" onclick="loadRequests()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="eco-card">
    <div class="table-responsive">
      <table class="eco-table">
        <thead>
          <tr><th>#</th><th>Citizen</th><th>Waste Type</th><th>Qty (kg)</th><th>Address</th><th>Preferred Date</th><th>Collector</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="requests-tbody">
          <tr><td colspan="9" class="text-center py-5"><div class="eco-spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Assign Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-user-check me-2"></i>Assign Collector</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <p class="text-muted mb-3">Assigning Request <strong id="assign-req-id"></strong></p>
      <label class="form-label">Select Collector</label>
      <select class="form-select" id="collector-select"><option>Loading...</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button class="btn-eco-primary" id="confirm-assign-btn" onclick="confirmAssign()"><i class="fas fa-check"></i> Assign</button>
    </div>
  </div></div>
</div>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-info-circle me-2"></i>Request Details</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="detail-body"></div>
  </div></div>
</div>

<!-- Notification Modal -->
<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-bell me-2"></i>Notifications</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('admin')) {}
  buildLayout('requests');

  let collectors = [];
  let assigningId = null;

  async function loadRequests() {
    const status = document.getElementById('filter-status').value;
    const type   = document.getElementById('filter-type').value;
    let url = '/requests/all?limit=50';
    if (status) url += `&status=${status}`;
    if (type)   url += `&waste_type=${type}`;

    const data = await apiRequest(url);
    const tbody = document.getElementById('requests-tbody');
    if (!data?.success || !data.requests.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📭</div><h4>No Requests Found</h4><p>Try changing filters.</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.requests.map(r => `
      <tr>
        <td><b style="color:var(--green-700);">#${r.id}</b></td>
        <td><div class="fw-semibold">${r.citizen_name}</div><div class="text-muted" style="font-size:.75rem;">${r.citizen_phone||''}</div></td>
        <td>${wasteTypeBadge(r.waste_type)}</td>
        <td>${r.quantity_kg ? r.quantity_kg + ' kg' : '—'}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.address}">${r.address}</td>
        <td>${formatDate(r.preferred_date)}</td>
        <td>${r.collector_name ? `<span class="badge-status badge-assigned">${r.collector_name}</span>` : '<span class="text-muted">Unassigned</span>'}</td>
        <td>${statusBadge(r.status)}</td>
        <td>
          <div class="d-flex gap-1">
            <button class="btn-eco-outline" style="font-size:.72rem;padding:.25rem .6rem;" onclick="showDetail(${JSON.stringify(r).replace(/"/g,'&quot;')})"><i class="fas fa-eye"></i></button>
            ${r.status==='pending'?`<button class="btn-eco-primary" style="font-size:.72rem;padding:.25rem .7rem;" onclick="openAssign(${r.id})"><i class="fas fa-user-check"></i> Assign</button>`:''}
          </div>
        </td>
      </tr>`).join('');
  }

  async function loadCollectors() {
    const data = await apiRequest('/admin/collectors');
    if (data?.success) collectors = data.collectors;
  }

  function openAssign(reqId) {
    assigningId = reqId;
    document.getElementById('assign-req-id').textContent = `#${reqId}`;
    const sel = document.getElementById('collector-select');
    sel.innerHTML = collectors.length
      ? collectors.filter(c=>c.is_active).map(c => `<option value="${c.id}">${c.full_name} — Zone: ${c.zone||'N/A'}</option>`).join('')
      : '<option>No collectors available</option>';
    new bootstrap.Modal(document.getElementById('assignModal')).show();
  }

  async function confirmAssign() {
    const collector_id = document.getElementById('collector-select').value;
    const btn = document.getElementById('confirm-assign-btn');
    setLoading(btn, true);
    const data = await apiRequest(`/requests/${assigningId}/assign`, 'PUT', { collector_id });
    setLoading(btn, false);
    bootstrap.Modal.getInstance(document.getElementById('assignModal')).hide();
    if (data?.success) { showToast('Collector assigned!', 'success'); loadRequests(); }
    else showToast(data?.message || 'Failed', 'error');
  }

  function showDetail(r) {
    document.getElementById('detail-body').innerHTML = `
      <div class="row g-3">
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">REQUEST ID</b><span style="font-family:var(--font-display);font-size:1.2rem;color:var(--green-700);">#${r.id}</span></div></div>
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">STATUS</b>${statusBadge(r.status)}</div></div>
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">CITIZEN</b>${r.citizen_name}<br><span style="font-size:.8rem;color:var(--text-muted);">${r.citizen_phone||''}</span></div></div>
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">WASTE TYPE</b>${wasteTypeBadge(r.waste_type)}</div></div>
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">QUANTITY</b>${r.quantity_kg ? r.quantity_kg + ' kg' : 'Not specified'}</div></div>
        <div class="col-md-6"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">PREFERRED DATE</b>${formatDate(r.preferred_date)} ${r.preferred_time||''}</div></div>
        <div class="col-12"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">ADDRESS</b>${r.address}</div></div>
        ${r.description?`<div class="col-12"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">DESCRIPTION</b>${r.description}</div></div>`:''}
        ${r.collector_name?`<div class="col-12"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">ASSIGNED COLLECTOR</b>${r.collector_name}</div></div>`:''}
        ${r.notes?`<div class="col-12"><div class="eco-card eco-alert-info"><b class="text-muted d-block mb-1" style="font-size:.72rem;">COLLECTOR NOTES</b>${r.notes}</div></div>`:''}
        <div class="col-12"><div class="eco-card"><b class="text-muted d-block mb-1" style="font-size:.72rem;">SUBMITTED</b>${formatDateTime(r.created_at)}</div></div>
      </div>`;
    new bootstrap.Modal(document.getElementById('detailModal')).show();
  }

  loadCollectors();
  loadRequests();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waste Reports – EcoServe Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">

  <div class="page-header">
    <div><h1 class="page-title">Waste Reports</h1><p class="page-subtitle">Analytics and collection reports across all zones</p></div>
  </div>

  <!-- Summary Stats -->
  <div class="row g-3 mb-4" id="summary-row">
    <div class="col-12 text-center py-4"><div class="eco-spinner"></div></div>
  </div>

  <!-- Charts -->
  <div class="row g-3 mb-4">
    <div class="col-lg-7">
      <div class="eco-card">
        <div class="eco-card-title"><i class="fas fa-chart-bar text-primary"></i> Monthly Waste Collected (kg) — This Year</div>
        <canvas id="monthlyKgChart" height="110"></canvas>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="eco-card">
        <div class="eco-card-title"><i class="fas fa-chart-pie text-primary"></i> Waste by Type (kg)</div>
        <canvas id="typeChart" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- Top Collectors -->
  <div class="row g-3 mb-4">
    <div class="col-lg-5">
      <div class="eco-card h-100">
        <div class="eco-card-title"><i class="fas fa-trophy text-primary"></i> Top Collectors</div>
        <div id="top-collectors">
          <div class="text-center py-4"><div class="eco-spinner"></div></div>
        </div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="eco-card h-100">
        <div class="eco-card-title"><i class="fas fa-list text-primary"></i> Filter & Browse Reports</div>
        <!-- Filters -->
        <div class="row g-2 mb-3">
          <div class="col-sm-4">
            <label class="form-label" style="font-size:.75rem;">Waste Type</label>
            <select class="form-select form-select-sm" id="f-type" onchange="loadReports()">
              <option value="">All Types</option>
              <option value="general">General</option>
              <option value="recyclable">Recyclable</option>
              <option value="hazardous">Hazardous</option>
              <option value="organic">Organic</option>
              <option value="e-waste">E-Waste</option>
            </select>
          </div>
          <div class="col-sm-4">
            <label class="form-label" style="font-size:.75rem;">From Date</label>
            <input type="date" class="form-control form-control-sm" id="f-from" onchange="loadReports()"/>
          </div>
          <div class="col-sm-4">
            <label class="form-label" style="font-size:.75rem;">To Date</label>
            <input type="date" class="form-control form-control-sm" id="f-to" onchange="loadReports()"/>
          </div>
        </div>
        <div class="table-responsive" style="max-height:320px;overflow-y:auto;">
          <table class="eco-table">
            <thead><tr><th>#</th><th>Collector</th><th>Type</th><th>Weight</th><th>Date</th><th>Disposal Site</th></tr></thead>
            <tbody id="reports-tbody">
              <tr><td colspan="6" class="text-center py-4"><div class="eco-spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Notification Modal -->
<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-bell me-2"></i>Notifications</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('admin')) {}
  buildLayout('reports');

  async function loadAnalytics() {
    const data = await apiRequest('/reports/analytics');
    if (!data?.success) return;

    const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const kgData  = Array(12).fill(0);
    data.by_month.forEach(m => { kgData[m.month - 1] = parseFloat(m.total_kg) || 0; });

    new Chart(document.getElementById('monthlyKgChart'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{
          label: 'kg collected', data: kgData,
          backgroundColor: 'rgba(34,136,63,.75)', borderRadius: 6,
          borderColor: 'rgba(34,136,63,1)', borderWidth: 1.5
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    const colors = ['#9aaba2','#3b82f6','#ef4444','#22c55e','#8b5cf6'];
    new Chart(document.getElementById('typeChart'), {
      type: 'doughnut',
      data: {
        labels: data.by_type.map(t => t.waste_type),
        datasets: [{ data: data.by_type.map(t => parseFloat(t.total_kg)), backgroundColor: colors, borderWidth: 2 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // Top collectors leaderboard
    const tcBox = document.getElementById('top-collectors');
    if (!data.by_collector.length) {
      tcBox.innerHTML = '<div class="empty-state" style="padding:2rem;"><div class="empty-icon">🏆</div><p>No reports yet.</p></div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    tcBox.innerHTML = data.by_collector.map((c, i) => `
      <div class="d-flex align-items-center gap-3 py-3 ${i < data.by_collector.length - 1 ? 'border-bottom' : ''}">
        <span style="font-size:1.4rem;width:28px;text-align:center;">${medals[i] || (i+1)}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--font-display);font-weight:700;font-size:.9rem;">${c.full_name}</div>
          <div style="font-size:.75rem;color:var(--text-muted);">${c.zone||'N/A'} · ${c.total_reports} report${c.total_reports!=1?'s':''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--font-display);font-weight:800;color:var(--green-700);">${parseFloat(c.total_kg).toFixed(1)} kg</div>
        </div>
      </div>`).join('');
  }

  async function loadSummary() {
    const data = await apiRequest('/reports/all');
    if (!data?.success) return;
    const s = data.summary;
    document.getElementById('summary-row').innerHTML = `
      <div class="col-6 col-md-4">
        <div class="stat-card stat-green">
          <div class="stat-icon"><i class="fas fa-weight-hanging"></i></div>
          <div><div class="stat-value">${parseFloat(s.total_kg).toFixed(0)} kg</div><div class="stat-label">Total Waste Collected</div></div>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="stat-card stat-blue">
          <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
          <div><div class="stat-value">${s.total_reports}</div><div class="stat-label">Total Reports</div></div>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="stat-card stat-amber">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div><div class="stat-value">${s.active_collectors}</div><div class="stat-label">Active Collectors</div></div>
        </div>
      </div>`;
  }

  async function loadReports() {
    const type = document.getElementById('f-type').value;
    const from = document.getElementById('f-from').value;
    const to   = document.getElementById('f-to').value;
    let url = '/reports/all?';
    if (type) url += `waste_type=${type}&`;
    if (from) url += `from_date=${from}&`;
    if (to)   url += `to_date=${to}&`;

    const data = await apiRequest(url);
    const tbody = document.getElementById('reports-tbody');
    if (!data?.success || !data.reports.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state" style="padding:2rem;"><div class="empty-icon">📋</div><p>No reports found.</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.reports.map(r => `
      <tr>
        <td><b style="color:var(--green-700);">#${r.id}</b></td>
        <td>${r.collector_name}</td>
        <td>${wasteTypeBadge(r.waste_type)}</td>
        <td><b>${parseFloat(r.total_weight_kg).toFixed(2)} kg</b></td>
        <td>${formatDate(r.collection_date)}</td>
        <td style="font-size:.8rem;">${r.disposal_site||'—'}</td>
      </tr>`).join('');
  }

  loadSummary();
  loadAnalytics();
  loadReports();
</script>
</body>
</html>

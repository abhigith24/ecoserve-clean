<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complaints – EcoServe Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<nav class="eco-navbar" id="app-navbar"></nav>
<div class="sidebar" id="app-sidebar"></div>
<div class="main-content">
  <div class="page-header">
    <div><h1 class="page-title">Complaints</h1><p class="page-subtitle">Review and respond to citizen complaints</p></div>
    <div class="d-flex gap-2">
      <select class="form-select" id="filter-status" style="width:auto;" onchange="loadComplaints()">
        <option value="">All Statuses</option>
        <option value="open">Open</option>
        <option value="under_review">Under Review</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
    </div>
  </div>

  <div class="row g-3" id="complaints-grid">
    <div class="col-12 text-center py-5"><div class="eco-spinner"></div></div>
  </div>
</div>

<!-- Respond Modal -->
<div class="modal fade" id="respondModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="fas fa-reply me-2"></i>Respond to Complaint <span id="resp-id"></span></h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div id="complaint-detail-box" class="mb-3"></div>
      <label class="form-label">Update Status</label>
      <select class="form-select mb-3" id="resp-status">
        <option value="under_review">Under Review</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <label class="form-label">Admin Response</label>
      <textarea class="form-control" id="resp-text" rows="4" placeholder="Write your official response here..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button class="btn-eco-primary" id="resp-btn" onclick="submitResponse()"><i class="fas fa-paper-plane"></i> Submit Response</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="notifModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Notifications</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="notif-body"></div>
  </div></div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script><script src="/js/layout.js"></script>
<script>
  if (!requireAuth('admin')) {}
  buildLayout('complaints');
  let currentComplaintId = null;

  const priorityBadge = p => ({
    low:    '<span class="badge-status" style="background:#f0fdf4;color:#166534;">🟢 Low</span>',
    medium: '<span class="badge-status" style="background:#fffbeb;color:#92400e;">🟡 Medium</span>',
    high:   '<span class="badge-status" style="background:#fee2e2;color:#991b1b;">🔴 High</span>'
  }[p] || p);

  const typeIcon = { missed_pickup:'🚛', improper_disposal:'🗑️', collector_behavior:'👤', bin_damage:'🪣', other:'❓' };

  async function loadComplaints() {
    const status = document.getElementById('filter-status').value;
    let url = '/complaints/all';
    if (status) url += `?status=${status}`;
    const data = await apiRequest(url);
    const grid = document.getElementById('complaints-grid');
    if (!data?.success || !data.complaints.length) {
      grid.innerHTML = '<div class="col-12"><div class="empty-state"><div class="empty-icon">✅</div><h4>No Complaints Found</h4></div></div>';
      return;
    }
    grid.innerHTML = data.complaints.map(c => `
      <div class="col-md-6 col-lg-4">
        <div class="eco-card h-100">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <span style="font-family:var(--font-display);font-weight:700;color:var(--green-700);">#${c.id} &nbsp;${typeIcon[c.complaint_type]||''}</span>
            ${statusBadge(c.status)}
          </div>
          <h6 style="font-family:var(--font-display);">${c.subject}</h6>
          <p class="text-muted" style="font-size:.82rem;line-height:1.5;">${c.description.length>120?c.description.slice(0,120)+'…':c.description}</p>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <div>
              <div style="font-size:.78rem;font-weight:600;">${c.citizen_name}</div>
              <div style="font-size:.72rem;color:var(--text-muted);">${formatDate(c.created_at)}</div>
            </div>
            ${priorityBadge(c.priority)}
          </div>
          ${c.admin_response ? `<div class="eco-alert eco-alert-success mt-3" style="font-size:.78rem;"><i class="fas fa-check-circle"></i> ${c.admin_response.slice(0,100)}${c.admin_response.length>100?'…':''}</div>` : ''}
          <button class="btn-eco-primary w-100 mt-3" style="font-size:.8rem;padding:.5rem;" onclick='openRespond(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
            <i class="fas fa-reply"></i> Respond
          </button>
        </div>
      </div>`).join('');
  }

  function openRespond(c) {
    currentComplaintId = c.id;
    document.getElementById('resp-id').textContent = `#${c.id}`;
    document.getElementById('resp-text').value = c.admin_response || '';
    document.getElementById('resp-status').value = c.status === 'open' ? 'under_review' : c.status;
    document.getElementById('complaint-detail-box').innerHTML = `
      <div class="eco-card" style="background:var(--green-50);">
        <div class="d-flex gap-2 mb-1">${statusBadge(c.status)} ${priorityBadge(c.priority)}</div>
        <h6 style="font-family:var(--font-display);">${c.subject}</h6>
        <p style="font-size:.85rem;color:var(--text-muted);">${c.description}</p>
        <div style="font-size:.78rem;color:var(--text-muted);">By <b>${c.citizen_name}</b> · ${formatDate(c.created_at)}</div>
      </div>`;
    new bootstrap.Modal(document.getElementById('respondModal')).show();
  }

  async function submitResponse() {
    const btn = document.getElementById('resp-btn');
    setLoading(btn, true);
    const data = await apiRequest(`/complaints/${currentComplaintId}/respond`, 'PUT', {
      status: document.getElementById('resp-status').value,
      admin_response: document.getElementById('resp-text').value
    });
    setLoading(btn, false);
    bootstrap.Modal.getInstance(document.getElementById('respondModal')).hide();
    if (data?.success) { showToast('Response submitted!', 'success'); loadComplaints(); }
    else showToast(data?.message || 'Failed', 'error');
  }

  loadComplaints();
</script>
</body>
</html>
